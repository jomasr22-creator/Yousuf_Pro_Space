<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youssef Emad Studio</title>
    <style>
        body { 
            margin: 0; background: #050505; color: white; font-family: sans-serif; text-align: center; 
            display: flex; flex-direction: column; justify-content: center; height: 100vh; overflow: hidden;
        }
        header { padding: 20px; border-radius: 20px; border: 1px solid #00f2fe; max-width: 80%; margin: 0 auto; }
        h1 { color: #fff; text-shadow: 0 0 10px #00f2fe, 0 0 20px #00f2fe; margin: 10px 0; font-size: 2em; }
        .play-btn { background: #00f2fe; color: black; border: none; padding: 15px 30px; border-radius: 30px; cursor: pointer; font-weight: bold; box-shadow: 0 0 15px #00f2fe; }
        #game-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        #game-canvas { width: 100%; height: 100%; position: relative; overflow: hidden; background: #050505; }
        #ship { position: absolute; bottom: 30px; left: 50%; font-size: 40px; transform: translateX(-50%); }
        .bullet { position: absolute; width: 4px; height: 15px; background: #00f2fe; box-shadow: 0 0 5px #00f2fe; }
        .enemy { position: absolute; font-size: 30px; }
        #score { position: absolute; top: 20px; right: 20px; color: #00f2fe; font-size: 20px; z-index: 10000; }
        #close-btn { position: absolute; top: 10px; left: 10px; background: red; color: white; border: none; padding: 10px; cursor: pointer; z-index: 10001; }
    </style>
</head>
<body>
    <header>
        <h1>YOUSSEF EMAD STUDIO</h1>
        <p>مبرمج واجهات وألعاب تفاعلية</p>
        <button class="play-btn" onclick="openGame()">العب الآن 🚀</button>
    </header>

    <div id="game-modal">
        <button id="close-btn" onclick="location.reload()">إغلاق X</button>
        <div id="game-canvas">
            <div id="score">النقاط: <span id="pts">0</span></div>
            <div id="ship">🚀</div>
        </div>
    </div>

    <script>
        let gameActive = false;
        function openGame() {
            document.getElementById('game-modal').style.display = 'block';
            gameActive = true;
            const canvas = document.getElementById('game-canvas');
            const ship = document.getElementById('ship');
            let score = 0;

            const move = (e) => {
                if(!gameActive) return;
                let x = (e.touches ? e.touches[0].clientX : e.clientX);
                ship.style.left = x + 'px';
            };
            canvas.addEventListener('mousemove', move);
            canvas.addEventListener('touchmove', move);

            setInterval(() => {
                if(!gameActive) return;
                const b = document.createElement('div');
                b.className = 'bullet';
                b.style.left = (ship.offsetLeft + 20) + 'px';
                b.style.bottom = '80px';
                canvas.appendChild(b);
                let bMove = setInterval(() => {
                    let bBottom = parseInt(b.style.bottom);
                    b.style.bottom = (bBottom + 12) + 'px';
                    if(bBottom > window.innerHeight) { b.remove(); clearInterval(bMove); }
                    document.querySelectorAll('.enemy').forEach(en => {
                        let r1 = b.getBoundingClientRect(), r2 = en.getBoundingClientRect();
                        if(!(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom)) {
                            en.innerText = '💥'; setTimeout(() => en.remove(), 100);
                            b.remove(); score += 10; document.getElementById('pts').innerText = score;
                        }
                    });
                }, 20);
            }, 350);

            setInterval(() => {
                if(!gameActive) return;
                const en = document.createElement('div');
                en.className = 'enemy'; en.innerText = '👾';
                en.style.left = Math.random() * (window.innerWidth - 40) + 'px';
                en.style.top = '-50px';
                canvas.appendChild(en);
                let eMove = setInterval(() => {
                    let eTop = parseInt(en.style.top);
                    en.style.top = (eTop + 5) + 'px';
                    let r1 = en.getBoundingClientRect(), r2 = ship.getBoundingClientRect();
                    if(!(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom)) {
                        gameActive = false; alert("انتهت اللعبة! نقاطك: " + score); location.reload();
                    }
                    if(eTop > window.innerHeight) { en.remove(); clearInterval(eMove); }
                }, 30);
            }, 1000);
        }
    </script>
</body>
</html>
