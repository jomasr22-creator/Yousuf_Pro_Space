<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yousuf Emad Space | حرب النجوم</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; padding: 15px; z-index: 100; position: absolute; top: 0; width: 100%; background: rgba(0,0,0,0.6); border-bottom: 2px solid #00d4ff; }
        
        /* تعديل الاسم ليصبح يوسف عماد مع تأثيرات قوية */
        h1 { margin: 0; font-size: 2.8rem; color: #fff; text-shadow: 0 0 10px #00d4ff, 0 0 20px #00d4ff, 0 0 40px #00d4ff; letter-spacing: 2px; }
        .user-name { color: #ffea00; text-shadow: 0 0 10px #ffea00; }
        
        .score { font-size: 1.4rem; color: #fff; margin-top: 5px; }
        canvas { display: block; background: radial-gradient(circle at center, #1B2735 0%, #000 100%); cursor: crosshair; }
    </style>
</head>
<body>

    <div class="header">
        <h1>YOUSUF <span class="user-name">EMAD</span> SPACE</h1>
        <div class="score">نقاط البطل: <span id="scoreVal">0</span></div>
    </div>

    <canvas id="starGame"></canvas>

    <script>
        const canvas = document.getElementById('starGame');
        const ctx = canvas.getContext('2d');
        const scoreVal = document.getElementById('scoreVal');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let player = { x: canvas.width/2, y: canvas.height - 100 };
        let bullets = [];
        let enemies = [];

        function createEnemy() {
            enemies.push({ x: Math.random()*(canvas.width-40), y: -50, w: 40, h: 40, speed: 5 });
        }
        setInterval(createEnemy, 600);

        function gameLoop() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.2)"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // رسم سفينة حربية متطورة
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#00d4ff";
            ctx.fillStyle = "#00d4ff";
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(player.x - 25, player.y + 45);
            ctx.lineTo(player.x + 25, player.y + 45);
            ctx.closePath();
            ctx.fill();

            // الطلقات
            bullets.forEach((b, bi) => {
                b.y -= 15;
                ctx.fillStyle = "#ff00ea";
                ctx.fillRect(b.x-2, b.y, 5, 15);
                if(b.y < 0) bullets.splice(bi, 1);
            });

            // الوحوش
            enemies.forEach((e, ei) => {
                e.y += e.speed;
                ctx.fillStyle = "#ff3300";
                ctx.fillRect(e.x, e.y, e.w, e.h);

                bullets.forEach((b, bi) => {
                    if(b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
                        enemies.splice(ei, 1);
                        bullets.splice(bi, 1);
                        score += 10;
                        scoreVal.innerText = score;
                    }
                });
                if(e.y > canvas.height) enemies.splice(ei, 1);
            });

            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('mousemove', (e) => { player.x = e.clientX; });
        window.addEventListener('mousedown', () => { bullets.push({ x: player.x, y: player.y }); });
        
        gameLoop();
    </script>

    <script type='text/javascript' src='//pl28850103.effectivegatecpm.com/6c/f2/31/6cf2317723a650167c4a3465573e6976.js'></script>

</body>
</html>
