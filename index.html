<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yousuf Pro Space | حرب النجوم الاحترافية</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; padding: 10px; z-index: 100; position: absolute; top: 0; width: 100%; background: rgba(0,0,0,0.5); }
        h1 { margin: 0; font-size: 2.2rem; color: #00d4ff; text-shadow: 0 0 15px #00d4ff; }
        .score { font-size: 1.2rem; color: #ffea00; }
        canvas { display: block; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); cursor: crosshair; }
    </style>
</head>
<body>

    <div class="header">
        <h1>YOUSUF PRO SPACE</h1>
        <div class="score">النقاط: <span id="scoreVal">0</span></div>
    </div>

    <canvas id="starGame"></canvas>

    <script>
        const canvas = document.getElementById('starGame');
        const ctx = canvas.getContext('2d');
        const scoreVal = document.getElementById('scoreVal');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let player = { x: canvas.width/2, y: canvas.height - 100, w: 60, h: 60 };
        let bullets = [];
        let enemies = [];
        let particles = [];

        // صنع تأثير النجوم المتساقطة
        function drawStars() {
            ctx.fillStyle = "#fff";
            for(let i=0; i<3; i++) {
                ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2);
            }
        }

        function createEnemy() {
            enemies.push({ x: Math.random()*(canvas.width-40), y: -50, w: 40, h: 40, speed: 4 + Math.random()*3 });
        }
        setInterval(createEnemy, 700);

        function gameLoop() {
            ctx.fillStyle = "rgba(0, 5, 15, 0.2)"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawStars();

            // رسم سفينة يوسف (شكل حربي)
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#00d4ff";
            ctx.fillStyle = "#00d4ff";
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(player.x - 30, player.y + 50);
            ctx.lineTo(player.x + 30, player.y + 50);
            ctx.closePath();
            ctx.fill();

            // الطلقات
            bullets.forEach((b, bi) => {
                b.y -= 12;
                ctx.fillStyle = "#ff0044";
                ctx.shadowColor = "#ff0044";
                ctx.fillRect(b.x-3, b.y, 6, 18);
                if(b.y < 0) bullets.splice(bi, 1);
            });

            // الوحوش (الأعداء)
            enemies.forEach((e, ei) => {
                e.y += e.speed;
                ctx.fillStyle = "#ff9900";
                ctx.shadowColor = "#ff9900";
                ctx.fillRect(e.x, e.y, e.w, e.h);

                // كشف التصادم
                bullets.forEach((b, bi) => {
                    if(b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
                        enemies.splice(ei, 1);
                        bullets.splice(bi, 1);
                        score += 10;
                        scoreVal.innerText = score;
                    }
                });

                if(e.y > canvas.height) enemies.splice(ei, 1);
            });

            requestAnimationFrame(gameLoop);
        }

        // تحكم سلس بالماوس واللمس
        window.addEventListener('mousemove', (e) => { player.x = e.clientX; });
        window.addEventListener('mousedown', () => { bullets.push({ x: player.x, y: player.y }); });
        window.addEventListener('touchstart', (e) => { 
            player.x = e.touches[0].clientX;
            bullets.push({ x: player.x, y: player.y });
        });

        gameLoop();
    </script>

    <script type='text/javascript' src='//pl28850103.effectivegatecpm.com/6c/f2/31/6cf2317723a650167c4a3465573e6976.js'></script>

</body>
</html>
