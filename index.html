<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>موقع المهندس يوسف عماد</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        #game-area { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle, #001 0%, #000 100%); overflow: hidden; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white; text-align: center; }
        .btn-start { background: #00d2ff; color: #000; border: none; padding: 15px 40px; border-radius: 30px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 0 15px #00d2ff; }
        #ship { position: absolute; width: 60px; height: 60px; font-size: 50px; z-index: 500; display: none; transform: translate3d(0,0,0); pointer-events: none; will-change: transform; }
        .bullet { position: absolute; width: 4px; height: 20px; background: #0ff; border-radius: 5px; z-index: 400; box-shadow: 0 0 10px #0ff; }
        .enemy { position: absolute; width: 40px; height: 40px; font-size: 35px; z-index: 300; transition: transform 0.1s linear; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 800; color: white; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 10px; border: 1px solid #00d2ff; }
    </style>
</head>
<body>
    <div id="game-area">
        <div id="start-screen" class="overlay">
            <h1>موقع المهندس <span style="color:#ffea00">يوسف عماد</span></h1>
            <p>اضغط للبدء في غزو الفضاء 🚀</p>
            <button class="btn-start" onclick="startGame()">انطلاق 🚀</button>
        </div>
        <div id="ui" style="display:none;">النقاط: <span id="score">0</span> | القلوب: <span id="lives">❤️❤️❤️</span></div>
        <div id="ship">🚀</div>
    </div>

    <script>
        const ship = document.getElementById('ship');
        const area = document.getElementById('game-area');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        let score = 0, lives = 3, isPaused = true, shipX = 0, shipY = 0, enemies = [];

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            ship.style.display = 'flex';
            isPaused = false;
            createEnemies();
            setInterval(fire, 400);
            requestAnimationFrame(gameLoop);
        }

        area.addEventListener('pointermove', (e) => {
            if (isPaused) return;
            shipX = e.clientX - 30; shipY = e.clientY - 30;
            ship.style.transform = `translate3d(${shipX}px, ${shipY}px, 0)`;
        });

        function createEnemies() {
            for(let r=0; r<3; r++) {
                for(let c=0; c<6; c++) {
                    const en = document.createElement('div');
                    en.className = 'enemy'; en.innerText = '👾';
                    en.style.left = (c * 60 + 50) + 'px'; en.style.top = (r * 60 + 50) + 'px';
                    area.appendChild(en); enemies.push(en);
                }
            }
        }

        function fire() {
            if (isPaused) return;
            const b = document.createElement('div'); b.className = 'bullet';
            b.style.left = (shipX + 28) + 'px'; b.style.top = (shipY) + 'px';
            area.appendChild(b);
            let m = setInterval(() => {
                let t = parseInt(b.style.top); b.style.top = (t - 10) + 'px';
                enemies.forEach((en, i) => {
                    let br = b.getBoundingClientRect(), er = en.getBoundingClientRect();
                    if (br.left < er.right && br.right > er.left && br.top < er.bottom && br.bottom > er.top) {
                        en.remove(); enemies.splice(i, 1); b.remove(); clearInterval(m);
                        score += 10; scoreEl.innerText = score;
                        if (enemies.length === 0) createEnemies();
                    }
                });
                if (t < -20) { b.remove(); clearInterval(m); }
            }, 10);
        }

        function gameLoop() {
            if (!isPaused) { /* إضافة حركة الأعداء هنا */ }
            requestAnimationFrame(gameLoop);
        }
    </script>
    <script type='text/javascript' src='//pl28850103.effectivegatecpm.com/6c/f2/31/6cf2317723a650167c4a3465573e6976.js'></script>
</body>
</html>
