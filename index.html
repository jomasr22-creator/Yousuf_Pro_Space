<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yousuf Pro Space</title>
    <style>
        /* كل التصميم هنا عشان متبقاش محتاج ملف CSS */
        body {
            margin: 0;
            background: #000;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        h1 { font-size: 2.5rem; text-shadow: 0 0 10px #00d4ff; margin: 10px; }
        .highlight { background: #00d4ff; padding: 2px 8px; border-radius: 5px; color: black; }
        #gameCanvas {
            border: 3px solid #00d4ff;
            background: #050505;
            box-shadow: 0 0 20px #00d4ff;
            max-width: 90%;
            max-height: 60vh;
        }
    </style>
</head>
<body>

    <h1>Yousuf Pro Space</h1>
    <p>استمتع <span class="highlight">باللعبة</span> الآن واجمع النقاط!</p>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        // كود اللعبة كامل هنا عشان متبقاش محتاج ملف script.js
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let x = canvas.width / 2;
        let y = canvas.height - 30;
        let dx = 2;
        let dy = -2;

        function drawBall() {
            ctx.beginPath();
            ctx.arc(x, y, 10, 0, Math.PI*2);
            ctx.fillStyle = "#00d4ff";
            ctx.fill();
            ctx.closePath();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBall();
            if(x + dx > canvas.width-10 || x + dx < 10) dx = -dx;
            if(y + dy > canvas.height-10 || y + dy < 10) dy = -dy;
            x += dx;
            y += dy;
            requestAnimationFrame(draw);
        }
        draw();
    </script>

    <script type='text/javascript' src='//pl28850103.effectivegatecpm.com/6c/f2/31/6cf2317723a650167c4a3465573e6976.js'></script>

</body>
</html>
