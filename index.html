<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>موقع المهندس يوسف عماد</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Segoe UI', sans-serif; color: white; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle, #0a0a2e 0%, #000 100%); overflow: hidden; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 500; text-align: center; }
        h1 { font-size: 35px; margin-bottom: 10px; color: #fff; text-shadow: 0 0 15px #00d2ff; }
        .name-highlight { color: #ffea00; }
        .btn-start { background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; border: none; padding: 15px 40px; border-radius: 40px; font-size: 22px; font-weight: bold; cursor: pointer; box-shadow: 0 0 25px rgba(0,210,255,0.6); margin-top: 20px; }

        #ship { position: absolute; width: 60px; height: 60px; font-size: 50px; z-index: 10; filter: drop-shadow(0 0 15px cyan); display: none; align-items: center; justify-content: center; touch-action: none; cursor: move; }
        .bullet { position: absolute; width: 4px; height: 20px; background: #00ffff; box-shadow: 0 0 10px #00ffff; border-radius: 5px; }
        .enemy { position: absolute; width: 45px; height: 45px; font-size: 35px; filter: drop-shadow(0 0 8px red); }

        #ui { position: absolute; top: 10px; right: 10px; z-index: 100; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 10px; border: 1px solid #00d2ff; font-size: 14px; }
        #share-btn { position: fixed; bottom: 15px; left: 15px; z-index: 1000; background: #25d366; color: white; border: none; padding: 10px 15px; border-radius: 50px; font-weight: bold; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="start-screen" class="overlay">
            <h1>موقع المهندس: <span class="name-highlight">يوسف عماد</span></h1>
            <p style="color: #00d2ff;">غزو الفضاء - تحكم طيران حر 🔊</p>
            <button class="btn-start" onclick="startGame()">ابدأ اللعب الآن 🚀</button>
        </div>

        <div id="level-screen" class="overlay" style="display:none;">
            <h2 id="level-msg" style="color: #2ecc71;">تم اجتياز المستوى! ✅</h2>
            <button class="btn-start" onclick="nextLevel()">المستوى التالي 🚀</button>
        </div>

        <div id="ui" style="display:none;">
            <div>المستوى: <span id="level-num">1</span></div>
            <div>النقاط: <span id="score">0</span></div>
            <div id="lives">❤️❤️❤️</div>
        </div>

        <div id="ship" style="left: 50%; top: 80%;">🚀</div>
    </div>

    <button id="share-btn" onclick="shareGame()">انشر اللعبة 📢</button>

    <script>
        const ship = document.getElementById('ship');
        const container = document.getElementById('game-container');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const levelEl = document.getElementById('level-num');

        let score = 0; let lives = 3; let level = 1; 
        let isGameOver = false; let isPaused = true;
        let enemySpeed = 4; let targetScore = 100;

        // مؤثرات صوتية
        const shootSound = new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3');
        const explodeSound = new Audio('https://www.soundjay.com/buttons/sounds/button-10.mp3');

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            ship.style.display = 'flex';
            isPaused = false;
            spawnEnemy();
            setInterval(fire, 400);
        }

        // تحكم حر 360 درجة (تتبع حركة الإصبع أو الماوس)
        const moveShip = (e) => {
            if (isGameOver || isPaused) return;
            e.preventDefault();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            // تحديث مكان السفينة لتتبع اللمس بالضبط
            let x = clientX - (ship.offsetWidth / 2);
            let y = clientY - (ship.offsetHeight / 2);

            // البقاء داخل حدود الشاشة
            if (x > 0 && x < window.innerWidth - ship.offsetWidth) ship.style.left = x + 'px';
            if (y > 0 && y < window.innerHeight - ship.offsetHeight) ship.style.top = y + 'px';
        };

        container.addEventListener('touchmove', moveShip, {passive: false});
        container.addEventListener('mousemove', moveShip);
