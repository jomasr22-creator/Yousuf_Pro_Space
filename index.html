<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حرب النجوم | Yousuf Pro Space</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #00d4ff; background: url('https://www.transparenttextures.com/patterns/stardust.png'); margin-top: 10px; box-shadow: 0 0 20px #00d4ff; }
        .info { text-align: center; z-index: 10; }
        h1 { margin: 5px; font-size: 2rem; text-shadow: 0 0 10px #00d4ff; }
    </style>
</head>
<body>

    <div class="info">
        <h1>Yousuf Pro Space - حرب النجوم</h1>
        <p>استخدم الأسهم للحركة والمسافة (Space) للإطلاق!</p>
    </div>

    <canvas id="starWarsGame"></canvas>

    <script>
        const canvas = document.getElementById('starWarsGame');
        const ctx = canvas.getContext('2d');
        canvas.width = 600; canvas.height = 400;

        let ship = { x: 275, y: 340, w: 50, h: 50, speed: 7 };
        let bullets = [];
        let enemies = [];
        let score = 0;

        // إنشاء الوحوش
        function createEnemy() {
            enemies.push({ x: Math.random() * (canvas.width - 30), y: -30, w: 30, h: 30, speed: 2 });
        }
        setInterval(createEnemy, 1000);

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // رسم السفينة (مثلث أزرق)
            ctx.fillStyle = "#00d4ff";
            ctx.beginPath();
            ctx.moveTo(ship.x + 25, ship.y);
            ctx.lineTo(ship.x, ship.y + 50);
            ctx.lineTo(ship.x + 50, ship.y + 50);
            ctx.fill();

            // الطلقات
            bullets.forEach((b, i) => {
                b.y -= 10;
                ctx.fillStyle = "yellow";
                ctx.fillRect(b.x, b.y, 5, 15);
                if(b.y < 0) bullets.splice(i, 1);
            });

            // الوحوش
            enemies.forEach((e, i) => {
                e.y += e.speed;
                ctx.fillStyle = "red";
                ctx.fillRect(e.x, e.y, e.w, e.h);

                // تصادم الطلقة مع الوحش
                bullets.forEach((b, bi) => {
                    if(b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
                        enemies.splice(i, 1);
                        bullets.splice(bi, 1);
                        score += 10;
                    }
                });

                if(e.y > canvas.height) enemies.splice(i, 1);
            });

            ctx.fillStyle = "white";
            ctx.fillText("Score: " + score, 10, 20);
            requestAnimationFrame(draw);
        }

        window.addEventListener('keydown', e => {
            if(e.key === "ArrowLeft" && ship.x > 0) ship.x -= ship.speed;
            if(e.key === "ArrowRight" && ship.x < canvas.width - 50) ship.x += ship.speed;
            if(e.key === " ") bullets.push({ x: ship.x + 22, y: ship.y });
        });

        draw();
    </script>

    <script type='text/javascript' src='//pl28850103.effectivegatecpm.com/6c/f2/31/6cf2317723a650167c4a3465573e6976.js'></script>

</body>
</html>
