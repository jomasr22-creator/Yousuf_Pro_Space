<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yousuf Pro Space | حرب النجوم المطورة</title>
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        .ui-layer { position: absolute; top: 10px; text-align: center; pointer-events: none; width: 100%; }
        h1 { margin: 0; font-size: 2.5rem; text-shadow: 0 0 15px #00d4ff; color: #00d4ff; }
        .score-board { font-size: 1.5rem; color: #ffea00; margin-top: 5px; }
        canvas { background: black; box-shadow: 0 0 50px rgba(0, 212, 255, 0.2); cursor: none; }
    </style>
</head>
<body>

    <div class="ui-layer">
        <h1>YOUSUF PRO SPACE</h1>
        <div class="score-board">النقاط: <span id="scoreVal">0</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreVal = document.getElementById('scoreVal');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let player = { x: canvas.width/2, y: canvas.height - 80, size: 40 };
        let bullets = [];
        let enemies = [];
        let stars = [];

        // إنشاء خلفية النجوم المتحركة (زي الفيديو بالظبط)
        for(let i=0; i<100; i++) {
            stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, speed: Math.random()*3 });
        }

        function createEnemy() {
            enemies.push({ x: Math.random()*(canvas.width-40), y: -50, size: 40, speed: 3 + Math.random()*2 });
        }
        setInterval(createEnemy, 800);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.3)"; // تأثير تتبع الحركة
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // رسم النجوم
            ctx.fillStyle = "white";
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fill();
                s.y += s.speed;
                if(s.y > canvas.height) s.y = 0;
            });

            // رسم سفينة يوسف المتطورة
            ctx.fillStyle = "#00d4ff";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#00d4ff";
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(player.x - 20, player.y + 40);
            ctx.lineTo(player.x + 20, player.y + 40);
            ctx.closePath();
            ctx.fill();

            // الطلقات الليزرية
            bullets.forEach((b, bi) => {
                b.y -= 15;
                ctx.fillStyle = "#ff00ea";
                ctx.shadowColor = "#ff00ea";
                ctx.fillRect(b.x-2, b.y, 4, 15);
                if(b.y < 0) bullets.splice(bi, 1);
            });

            // الأعداء (الوحوش)
            enemies.forEach((e, ei) => {
                e.y += e.speed;
                ctx.fillStyle = "#ff3c00";
                ctx.shadowColor = "#ff3c00";
                ctx.beginPath();
                ctx.arc(e.x, e.y, 15, 0, Math.PI*2);
                ctx.fill();

                // التصادم
                bullets.forEach((b, bi) => {
                    let dist = Math.hypot(b.x - e.x, b.y - e.y);
                    if(dist < 20) {
                        enemies.splice(ei, 1);
                        bullets.splice(bi, 1);
                        score += 10;
                        scoreVal.innerHTML = score;
                    }
                });

                if(e.y > canvas.height) enemies.splice(ei, 1);
            });

            requestAnimationFrame(draw);
        }

        // التحكم بالماوس أو اللمس (أسهل بكتير)
        window.addEventListener('mousemove', (e) => {
            player.x = e.clientX;
        });

        window.addEventListener('click', () => {
            bullets.push({ x: player.x, y: player.y });
        });

        draw();
    </script>

    <script type='text/javascript' src='//pl28850103.effectivegatecpm.com/6c/f2/31/6cf2317723a650167c4a3465573e6976.js'></script>

</body>
</html>
