<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>موقع المهندس يوسف عماد - Galaxy Pro</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        #game-area { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle, #000b1a 0%, #000 100%); overflow: hidden; }
        
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white; text-align: center; }
        .btn-start { background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: #fff; border: none; padding: 15px 45px; border-radius: 30px; font-size: 22px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 0 20px #00d2ff; }

        #ship { position: absolute; width: 60px; height: 60px; font-size: 50px; z-index: 500; display: none; align-items: center; justify-content: center; left: 0; top: 0; will-change: transform; filter: drop-shadow(0 0 10px cyan); }
        
        .bullet { position: absolute; width: 4px; height: 18px; background: #0ff; border-radius: 5px; z-index: 400; box-shadow: 0 0 8px #0ff; }
        .enemy-bullet { position: absolute; width: 5px; height: 12px; background: #ff4757; border-radius: 50%; z-index: 350; box-shadow: 0 0 10px #ff4757; }
        
        .enemy { position: absolute; width: 45px; height: 45px; font-size: 35px; z-index: 300; transition: top 1s ease-out; }
        .powerup { position: absolute; width: 40px; height: 40px; font-size: 30px; z-index: 450; animation: bounce 1s infinite; }
        
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        #ui { position: absolute; top: 10px; left: 10px; z-index: 800; color: white; background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 12px; border: 1px solid #00d2ff; }
    </style>
</head>
<body>

    <div id="game-area">
        <div id="start-screen" class="overlay">
            <h1>موقع المهندس <span style="color:#ffea00">يوسف عماد</span></h1>
            <p style="color: #00d2ff;">نظام الكتائب: طور سلاحك واهزمهم! 🛡️</p>
            <button class="btn-start" onclick="startGame()">ابدأ الهجوم 🚀</button>
        </div>

        <div id="ui" style="display:none;">
            <div>النقاط: <span id="score">0</span></div>
            <div>القلوب: <span id="lives">❤️❤️❤️</span></div>
            <div id="weapon-status" style="color:#2ecc71; font-size:12px;">سلاح عادي</div>
        </div>

        <div id="ship">🚀</div>
    </div>

    <script>
        const ship = document.getElementById('ship');
        const area = document.getElementById('game-area');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const weaponEl = document.getElementById('weapon-status');

        let score = 0; let lives = 3; let isPaused = true;
        let isDoubleShot = false;
        let shipX = 0, shipY = 0;

        const shootSnd = new Audio('https://noproblo.dayjo.org/ZeldaSounds/LTTP/LTTP_Arrow_Shoot.wav');
        const powerSnd = new Audio('https://noproblo.dayjo.org/ZeldaSounds/LTTP/LTTP_Item.wav');

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            ship.style.display = 'flex';
            isPaused = false;
            createEnemies();
            setInterval(fire, 400);
            setInterval(spawnPowerup, 12000);
        }

        area.addEventListener('pointermove', (e) => {
            if (isPaused) return;
            shipX = e.clientX - 30; shipY = e.clientY - 30;
            ship.style.transform = `translate3d(${shipX}px, ${shipY}px, 0)`;
        });

        function fire() {
            if (isPaused) return;
            shootSnd.cloneNode(true).play().catch(()=>{});
            
            if (isDoubleShot) {
                createBullet(shipX + 10, shipY);
                createBullet(shipX + 50, shipY);
            } else {
                createBullet(shipX + 30, shipY);
            }
        }

        function createBullet(x, y) {
            const b = document.createElement('div');
            b.className = 'bullet';
            b.style.left = x + 'px'; b.style.top = y + 'px';
            area.appendChild(b);
            let m = setInterval(() => {
                let t = parseInt(b.style.top);
                b.style.top = (t - 15) + 'px';
                document.querySelectorAll('.enemy').forEach(en => {
                    let br = b.getBoundingClientRect(), er = en.getBoundingClientRect();
                    if (br.left < er.right && br.right > er.left && br.top < er.bottom && br.bottom > er.top) {
                        en.innerText = '💥'; setTimeout(() => en.remove(), 150);
                        b.remove(); clearInterval(m);
                        score += 10; scoreEl.innerText = score;
                        if(document.querySelectorAll('.enemy').length === 0) createEnemies();
                    }
                });
                if (t < -20) { b.remove(); clearInterval(m); }
            }, 15);
        }

        function createEnemies() {
            if (isPaused) return;
            let rows = 3, cols = 6;
            for(let r=0; r<rows; r++) {
                for(let c=0; c<cols; c++) {
                    const en = document.createElement('div');
                    en.className = 'enemy';
                    en.innerText = '🛸';
                    en.style.left = (c * (window.innerWidth / cols) + 20) + 'px';
                    en.style.top = (r * 60 + 50) + 'px';
                    area.appendChild(en);
                    setInterval(() => enemyFire(en), 2000 + Math.random() * 3000);
                }
            }
        }

        function enemyFire(en) {
            if (isPaused || !en.parentElement) return;
            const eb = document.createElement('div');
            eb.className = 'enemy-bullet';
            eb.style.left = (parseInt(en.style.left) + 20) + 'px';
            eb.style.top = (parseInt(en.style.top) + 40) + 'px';
            area.appendChild(eb);

            let m = setInterval(() => {
                let t = parseInt(eb.style.top);
                eb.style.top = (t + 6) + 'px';
                let sr = ship.getBoundingClientRect(), ebr = eb.getBoundingClientRect();
                if (ebr.left < sr.right && ebr.right > sr.left && ebr.top < sr.bottom && ebr.bottom > sr.top) {
                    eb.remove(); clearInterval(m);
                    lives--; livesEl.innerText = "❤️".repeat(lives);
                    if (lives <= 0) location.reload();
                }
                if (t > window.innerHeight) { eb.remove(); clearInterval(m); }
            }, 20);
        }

        function spawnPowerup() {
            if (isPaused) return;
            const p = document.createElement('div');
            p.className = 'powerup';
            p.innerText = '🎁';
            p.style.left = Math.random() * (window.innerWidth - 40) + 'px';
            p.style.top = '-50px';
            area.appendChild(p);
            let pm = setInterval(() => {
                let pt = parseInt(p.style.top);
                p.style.top = (pt + 4) + 'px';
                let sr = ship.getBoundingClientRect(), pr = p.getBoundingClientRect();
                if (pr.left < sr.right && pr.right > sr.left && pr.top < sr.bottom && pr.bottom > sr.top) {
                    powerSnd.play(); p.remove(); clearInterval(pm);
                    isDoubleShot = true; weaponEl.innerText = "سلاح مزدوج فعال! 🔥";
                    setTimeout(() => { isDoubleShot = false; weaponEl.innerText = "سلاح عادي"; }, 8000);
                }
                if (pt > window.innerHeight) { p.remove(); clearInterval(pm); }
            }, 20);
        }
    </script>
    <script type='text/javascript' src='//pl28850103.effectivegatecpm.com/6c/f2/31/6cf2317723a650167c4a3465573e6976.js'></script>
</body>
</html>
