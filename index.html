<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>موقع المهندس يوسف عماد</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        #game-area { position: relative; width: 100vw; height: 100vh; background: #000510; overflow: hidden; }
        
        /* واجهة الدخول */
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white; text-align: center; }
        .btn-start { background: #00d2ff; color: #000; border: none; padding: 15px 40px; border-radius: 30px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 20px; }

        /* السفينة - استخدمنا التحريك بالـ transform لسرعة قصوى */
        #ship { 
            position: absolute; 
            width: 60px; 
            height: 60px; 
            font-size: 50px; 
            z-index: 500; 
            display: none; 
            align-items: center; 
            justify-content: center;
            pointer-events: none; /* عشان ميعطلش اللمس */
            left: 0; top: 0;
            will-change: transform;
        }

        .bullet { position: absolute; width: 4px; height: 20px; background: #0ff; border-radius: 5px; z-index: 400; }
        .enemy { position: absolute; width: 50px; height: 50px; font-size: 40px; z-index: 300; }
        #ui { position: absolute; top: 10px; right: 10px; z-index: 800; color: white; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="game-area">
        <div id="start-screen" class="overlay">
            <h1>موقع المهندس يوسف عماد</h1>
            <p>تحكم حر كامل (فوق وتحت) + صوت 🚀</p>
            <button class="btn-start" onclick="startGame()">ابدأ المعركة 🎮</button>
        </div>

        <div id="ui" style="display:none;">
            النقاط: <span id="score">0</span> | القلوب: <span id="lives">❤️❤️❤️</span>
        </div>

        <div id="ship">🚀</div>
    </div>

    <script>
        const ship = document.getElementById('ship');
        const area = document.getElementById('game-area');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');

        let score = 0; let lives = 3; let isPaused = true;
        
        // أصوات عالمية
        const shootSnd = new Audio('https://noproblo.dayjo.org/ZeldaSounds/LTTP/LTTP_Arrow_Shoot.wav');
        const hitSnd = new Audio('https://noproblo.dayjo.org/ZeldaSounds/LTTP/LTTP_Enemy_Hit.wav');

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            ship.style.display = 'flex';
            isPaused = false;
            spawnEnemy();
            setInterval(fire, 400);
        }

        // السر هنا: التحكم عن طريق مساحة اللعب كلها
        area.addEventListener('pointermove', (e) => {
            if (isPaused) return;
            
            // وضع السفينة في منتصف الصباع/الماوس بالضبط
            const x = e.clientX - 30;
            const y = e.clientY - 30;
            
            // تحريك السفينة باستخدام الـ Transform (أسرع وأدق طريقة في المتصفحات)
            ship.style.transform = `translate3d(${x}px, ${y}px, 0)`;
            
            // تخزين الإحداثيات عشان الطلقات تطلع من مكانها الصح
            ship.dataset.x = x;
            ship.dataset.y = y;
        });

        function fire() {
            if (isPaused) return;
            shootSnd.cloneNode(true).play().catch(()=>{});
            
            const b = document.createElement('div');
            b.className = 'bullet';
            const curX = parseFloat(ship.dataset.x) || (window.innerWidth/2 - 30);
            const curY = parseFloat(ship.dataset.y) || (window.innerHeight - 100);
            
            b.style.left = (curX + 28) + 'px';
            b.style.top = (curY) + 'px';
            area.appendChild(b);

            let m = setInterval(() => {
                let t = parseInt(b.style.top);
                b.style.top = (t - 10) + 'px';

                document.querySelectorAll('.enemy').forEach(en => {
                    let br = b.getBoundingClientRect();
                    let er = en.getBoundingClientRect();
                    if (br.left < er.right && br.right > er.left && br.top < er.bottom && br.bottom > er.top) {
                        hitSnd.cloneNode(true).play().catch(()=>{});
                        en.innerText = '💥'; setTimeout(() => en.remove(), 100);
                        b.remove(); clearInterval(m);
                        score += 10; scoreEl.innerText = score;
                    }
                });
                if (t < -20) { b.remove(); clearInterval(m); }
            }, 10);
        }

        function spawnEnemy() {
            if (isPaused) return;
            const en = document.createElement('div');
            en.className = 'enemy';
            en.innerText = '👾';
            en.style.left = Math.random() * (window.innerWidth - 50) + 'px';
            en.style.top = '-50px';
            area.appendChild(en);

            let em = setInterval(() => {
                if (isPaused) return;
                let et = parseInt(en.style.top);
                en.style.top = (et + 4) + 'px';

                let sr = ship.getBoundingClientRect();
                let er = en.getBoundingClientRect();
                if (er.left < sr.right && er.right > sr.left && er.top < sr.bottom && er.bottom > sr.top) {
                    en.remove(); clearInterval(em);
                    lives--; livesEl.innerText = "❤️".repeat(lives);
                    if (lives <= 0) location.reload();
                }
                if (et > window.innerHeight) { en.remove(); clearInterval(em); }
            }, 20);
            setTimeout(spawnEnemy, 1000);
        }
    </script>

    <script type='text/javascript' src='//pl28850103.effectivegatecpm.com/6c/f2/31/6cf2317723a650167c4a3465573e6976.js'></script>
</body>
</html>
